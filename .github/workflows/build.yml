name: Build Waifu2x-Extension-GUI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81'
        cache: true
        
    - name: Build project
      shell: cmd
      working-directory: SRC_v3.41.01-beta/Waifu2x-Extension-QT
      run: |
        qmake Waifu2x-Extension-QT.pro
        mingw32-make -j%NUMBER_OF_PROCESSORS%
        
    - name: Check build output
      shell: powershell
      run: |
        Write-Host "=== Build output check ==="
        Write-Host "Current directory:"
        Get-Location
        Write-Host "`nLooking for .exe files:"
        Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object { 
          Write-Host "  Found: $($_.FullName) ($($_.Length) bytes)"
        }
        Write-Host "`nDirectory structure:"
        Get-ChildItem -Path "SRC_v3.41.01-beta/Waifu2x-Extension-QT" -Directory | ForEach-Object {
          Write-Host "  - $($_.Name)"
        }
        
    - name: Prepare artifacts
      shell: powershell
      run: |
        # Find the executable
        Write-Host "Searching for executables..."
        $exeFiles = Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
        
        Write-Host "Found executables:"
        $exeFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
        
        $mainExe = $exeFiles | Where-Object { $_.Name -eq "Waifu2x-Extension-GUI.exe" } | Select-Object -First 1
        
        if ($mainExe) {
          Write-Host "Found main executable: $($mainExe.FullName)"
          New-Item -ItemType Directory -Force -Path "artifact"
          Copy-Item -Path $mainExe.FullName -Destination "artifact\" -Force
          
          # Deploy Qt dependencies
          Write-Host "`nQt installation info:"
          Write-Host "Qt root: $env:Qt5_DIR"
          Write-Host "PATH contains:"
          $env:PATH -split ';' | Where-Object { $_ -like "*Qt*" } | ForEach-Object { Write-Host "  $_" }
          
          # Change to artifact directory and run windeployqt there
          Push-Location "artifact"
          Write-Host "`nRunning windeployqt from artifact directory..."
          
          # Run windeployqt with proper flags
          $deployResult = & windeployqt.exe --release --force --compiler-runtime --no-system-d3d-compiler --no-angle --no-opengl-sw Waifu2x-Extension-GUI.exe 2>&1
          Write-Host $deployResult
          
          Pop-Location
          
          Write-Host "`nArtifact contents:"
          Get-ChildItem -Path "artifact" -Recurse | Select-Object -First 50 | ForEach-Object { 
            $relativePath = $_.FullName.Replace((Resolve-Path "artifact").Path, "").TrimStart('\')
            if ($_.PSIsContainer) {
              Write-Host "  [DIR]  $relativePath"
            } else {
              Write-Host "  [FILE] $relativePath ($($_.Length) bytes)"
            }
          }
          
          # Check if essential DLLs are present
          $requiredDlls = @("Qt5Core.dll", "Qt5Gui.dll", "Qt5Widgets.dll")
          $missing = @()
          foreach ($dll in $requiredDlls) {
            if (-not (Test-Path "artifact\$dll")) {
              $missing += $dll
            }
          }
          
          if ($missing.Count -gt 0) {
            Write-Warning "Missing Qt DLLs: $($missing -join ', ')"
            Write-Host "Attempting manual copy of Qt DLLs..."
            
            # Find Qt bin directory
            $qtBin = Split-Path -Parent (Get-Command qmake.exe).Source
            Write-Host "Qt bin directory: $qtBin"
            
            # Copy essential DLLs
            $qtDlls = Get-ChildItem "$qtBin\Qt5*.dll" -ErrorAction SilentlyContinue
            foreach ($dll in $qtDlls) {
              Copy-Item $dll.FullName "artifact\" -Force
              Write-Host "  Copied: $($dll.Name)"
            }
            
            # Copy platforms plugin
            New-Item -ItemType Directory -Force -Path "artifact\platforms" | Out-Null
            if (Test-Path "$qtBin\..\plugins\platforms\qwindows.dll") {
              Copy-Item "$qtBin\..\plugins\platforms\qwindows.dll" "artifact\platforms\" -Force
              Write-Host "  Copied: platforms\qwindows.dll"
            }
          } else {
            Write-Host "All essential Qt DLLs are present!"
          }
        } else {
          Write-Error "Waifu2x-Extension-GUI.exe not found!"
          exit 1
        }
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Waifu2x-Extension-GUI-Windows
        path: artifact/
        if-no-files-found: warn
