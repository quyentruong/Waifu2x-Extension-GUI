name: Build Waifu2x-Extension-GUI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81'
        cache: true
        
    - name: Build project
      shell: cmd
      working-directory: SRC_v3.41.01-beta/Waifu2x-Extension-QT
      run: |
        qmake Waifu2x-Extension-QT.pro
        mingw32-make -j%NUMBER_OF_PROCESSORS%
        
    - name: Check build output
      shell: powershell
      run: |
        Write-Host "=== Build output check ==="
        Write-Host "Current directory:"
        Get-Location
        Write-Host "`nLooking for .exe files:"
        Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object { 
          Write-Host "  Found: $($_.FullName) ($($_.Length) bytes)"
        }
        Write-Host "`nDirectory structure:"
        Get-ChildItem -Path "SRC_v3.41.01-beta/Waifu2x-Extension-QT" -Directory | ForEach-Object {
          Write-Host "  - $($_.Name)"
        }
        
    - name: Prepare artifacts
      shell: powershell
      run: |
        # Find the executable
        Write-Host "Searching for executables..."
        $exeFiles = Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
        
        Write-Host "Found executables:"
        $exeFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
        
        $mainExe = $exeFiles | Where-Object { $_.Name -eq "Waifu2x-Extension-GUI.exe" } | Select-Object -First 1
        
        if ($mainExe) {
          Write-Host "Found main executable: $($mainExe.FullName)"
          New-Item -ItemType Directory -Force -Path "artifact"
          Copy-Item -Path $mainExe.FullName -Destination "artifact\" -Force
          
          # Deploy Qt dependencies
          Write-Host "`nQt installation info:"
          Write-Host "Qt root: $env:Qt5_DIR"
          Write-Host "QT_PLUGIN_PATH: $env:QT_PLUGIN_PATH"
          
          # Get Qt bin directory
          $qtBin = Split-Path -Parent (Get-Command qmake.exe).Source
          Write-Host "Qt bin directory: $qtBin"
          
          # Ensure QT_PLUGIN_PATH is set for windeployqt
          if (-not $env:QT_PLUGIN_PATH) {
            $pluginPath = Join-Path (Split-Path $qtBin -Parent) "plugins"
            $env:QT_PLUGIN_PATH = $pluginPath
            Write-Host "Set QT_PLUGIN_PATH: $pluginPath"
          }
          
          # Run windeployqt with absolute path
          $exePath = Resolve-Path "artifact\Waifu2x-Extension-GUI.exe"
          Write-Host "`nRunning windeployqt on: $exePath"
          
          $windeployqt = Join-Path $qtBin "windeployqt.exe"
          & $windeployqt --release --force --compiler-runtime --no-system-d3d-compiler --no-angle --no-opengl-sw "$exePath"
          
          Write-Host "`nArtifact contents:"
          Get-ChildItem -Path "artifact" -Recurse | Select-Object -First 50 | ForEach-Object { 
            if ($_.PSIsContainer) {
              Write-Host "  [DIR]  $($_.Name)"
            } else {
              Write-Host "  [FILE] $($_.Name) ($($_.Length) bytes)"
            }
          }
          
          # Check if essential DLLs and plugins are present
          $requiredDlls = @("Qt5Core.dll", "Qt5Gui.dll", "Qt5Widgets.dll")
          $missingDlls = @()
          foreach ($dll in $requiredDlls) {
            if (-not (Test-Path "artifact\$dll")) {
              $missingDlls += $dll
            }
          }
          
          $pluginOk = Test-Path "artifact\platforms\qwindows.dll"
          
          if ($missingDlls.Count -gt 0 -or -not $pluginOk) {
            Write-Warning "windeployqt did not copy all files. Performing manual copy..."
            
            # Manual copy Qt DLLs
            if ($missingDlls.Count -gt 0) {
              Write-Host "Copying Qt DLLs from $qtBin..."
              Get-ChildItem "$qtBin\Qt5*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "artifact\" -Force
                Write-Host "  Copied: $($_.Name)"
              }
              
              # Copy MinGW runtime DLLs
              Get-ChildItem "$qtBin\lib*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "artifact\" -Force
                Write-Host "  Copied: $($_.Name)"
              }
            }
            
            # Manual copy plugins
            if (-not $pluginOk) {
              Write-Host "Copying Qt plugins..."
              $qtRoot = Split-Path $qtBin -Parent
              $pluginSrc = Join-Path $qtRoot "plugins"
              
              # Copy platform plugin (mandatory)
              $platformDir = "artifact\platforms"
              New-Item -ItemType Directory -Force -Path $platformDir | Out-Null
              Copy-Item "$pluginSrc\platforms\qwindows.dll" $platformDir -Force -ErrorAction SilentlyContinue
              Write-Host "  Copied: platforms\qwindows.dll"
              
              # Copy other useful plugins
              $optionalPlugins = @("imageformats", "multimedia", "mediaservice", "audio")
              foreach ($pluginType in $optionalPlugins) {
                $srcPath = Join-Path $pluginSrc $pluginType
                if (Test-Path $srcPath) {
                  $destPath = "artifact\$pluginType"
                  New-Item -ItemType Directory -Force -Path $destPath | Out-Null
                  Get-ChildItem "$srcPath\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                    Copy-Item $_.FullName $destPath -Force
                  }
                  Write-Host "  Copied plugins: $pluginType"
                }
              }
            }
          } else {
            Write-Host "All essential Qt files deployed successfully!"
          }
        } else {
          Write-Error "Waifu2x-Extension-GUI.exe not found!"
          exit 1
        }
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Waifu2x-Extension-GUI-Windows
        path: artifact/
        if-no-files-found: warn
