name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: 'manual-build'

jobs:
  build-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Get version
      id: version
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $version = "${{ github.ref_name }}"
        } else {
          $version = "${{ github.event.inputs.version }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Building version: $version"
        
    - name: Install Qt 5.15.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81'
        cache: true
        
    - name: Build Release
      shell: cmd
      working-directory: SRC_v3.41.01-beta/Waifu2x-Extension-QT
      run: |
        qmake Waifu2x-Extension-QT.pro "CONFIG+=release"
        mingw32-make -j%NUMBER_OF_PROCESSORS%
        
    - name: Prepare Release Package
      shell: powershell
      run: |
        # Create release directory
        New-Item -ItemType Directory -Force -Path "release-package"
        
        # Find executable
        Write-Host "Searching for Waifu2x-Extension-GUI.exe..."
        $exePath = Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "Waifu2x-Extension-GUI.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        
        if (-not $exePath) {
          Write-Host "Executable not found with exact name, searching for any .exe..."
          $allExes = Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          $allExes | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          $exePath = $allExes | Where-Object { $_.Name -like "*Waifu2x*" } | Select-Object -First 1
        }
        
        if ($exePath) {
          Write-Host "Found executable: $($exePath.FullName)"
          Copy-Item -Path $exePath.FullName -Destination "release-package\" -Force
          
          # Ensure it's named correctly
          if ($exePath.Name -ne "Waifu2x-Extension-GUI.exe") {
            Rename-Item -Path "release-package\$($exePath.Name)" -NewName "Waifu2x-Extension-GUI.exe" -Force
          }
          
          # Deploy Qt dependencies
          Write-Host "Running windeployqt..."
          
          # Get Qt paths
          $qtBin = Split-Path -Parent (Get-Command qmake.exe).Source
          $qtRoot = Split-Path $qtBin -Parent
          
          # Ensure QT_PLUGIN_PATH is set
          if (-not $env:QT_PLUGIN_PATH) {
            $env:QT_PLUGIN_PATH = Join-Path $qtRoot "plugins"
          }
          
          # Run windeployqt with absolute path
          $targetExe = Resolve-Path "release-package\Waifu2x-Extension-GUI.exe"
          $windeployqt = Join-Path $qtBin "windeployqt.exe"
          & $windeployqt --release --force --compiler-runtime --no-system-d3d-compiler --no-angle --no-opengl-sw "$targetExe"
          
          # Verify Qt deployment
          $requiredDlls = @("Qt5Core.dll", "Qt5Gui.dll", "Qt5Widgets.dll")
          $missingDlls = @()
          foreach ($dll in $requiredDlls) {
            if (-not (Test-Path "release-package\$dll")) {
              $missingDlls += $dll
            }
          }
          
          $pluginOk = Test-Path "release-package\platforms\qwindows.dll"
          
          if ($missingDlls.Count -gt 0 -or -not $pluginOk) {
            Write-Warning "windeployqt incomplete. Performing manual copy..."
            
            # Copy Qt DLLs
            if ($missingDlls.Count -gt 0) {
              Get-ChildItem "$qtBin\Qt5*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "release-package\" -Force
                Write-Host "  Copied: $($_.Name)"
              }
              
              # Copy MinGW runtime
              Get-ChildItem "$qtBin\lib*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "release-package\" -Force
                Write-Host "  Copied: $($_.Name)"
              }
            }
            
            # Copy plugins
            if (-not $pluginOk) {
              $pluginSrc = Join-Path $qtRoot "plugins"
              
              # Platform plugin (mandatory)
              New-Item -ItemType Directory -Force -Path "release-package\platforms" | Out-Null
              Copy-Item "$pluginSrc\platforms\qwindows.dll" "release-package\platforms\" -Force -ErrorAction SilentlyContinue
              Write-Host "  Copied: platforms\qwindows.dll"
              
              # Optional plugins
              $pluginTypes = @("imageformats", "multimedia", "mediaservice", "audio")
              foreach ($type in $pluginTypes) {
                $srcPath = Join-Path $pluginSrc $type
                if (Test-Path $srcPath) {
                  $destPath = "release-package\$type"
                  New-Item -ItemType Directory -Force -Path $destPath | Out-Null
                  Get-ChildItem "$srcPath\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                    Copy-Item $_.FullName $destPath -Force
                  }
                  Write-Host "  Copied plugins: $type"
                }
              }
            }
          } else {
            Write-Host "All Qt files deployed successfully!"
          }
          
          # Copy README and LICENSE
          if (Test-Path "README.md") { Copy-Item "README.md" "release-package\" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "release-package\" }
          
          Write-Host "Package contents:"
          Get-ChildItem -Path "release-package" -Name
        } else {
          Write-Error "Executable not found!"
          Write-Host "Directory structure:"
          Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Directory | Select-Object -First 30 | ForEach-Object { Write-Host $_.FullName }
          exit 1
        }
        
    - name: Create Archive
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $archiveName = "Waifu2x-Extension-GUI-$version-Windows-x64.zip"
        Compress-Archive -Path "release-package\*" -DestinationPath $archiveName
        echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV
        
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Waifu2x-Extension-GUI-${{ steps.version.outputs.VERSION }}
        path: release-package/
        
    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ARCHIVE_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
