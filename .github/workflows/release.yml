name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: 'manual-build'

jobs:
  build-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Get version
      id: version
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $version = "${{ github.ref_name }}"
        } else {
          $version = "${{ github.event.inputs.version }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Building version: $version"
        
    - name: Install Qt 5.15.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81'
        cache: true
        
    - name: Build Release
      shell: cmd
      working-directory: SRC_v3.41.01-beta/Waifu2x-Extension-QT
      run: |
        qmake Waifu2x-Extension-QT.pro "CONFIG+=release"
        mingw32-make -j%NUMBER_OF_PROCESSORS%
        
    - name: Prepare Release Package
      shell: powershell
      run: |
        # Create release directory
        New-Item -ItemType Directory -Force -Path "release-package"
        
        # Find and copy executable
        $exePath = Get-ChildItem -Path "SRC_v3.41.01-beta" -Recurse -Filter "Waifu2x-Extension-GUI.exe" | Select-Object -First 1
        
        if ($exePath) {
          Write-Host "Found executable: $($exePath.FullName)"
          Copy-Item -Path $exePath.FullName -Destination "release-package\" -Force
          
          # Deploy Qt dependencies
          Push-Location "release-package"
          windeployqt.exe --release Waifu2x-Extension-GUI.exe
          Pop-Location
          
          # Copy README and LICENSE
          if (Test-Path "README.md") { Copy-Item "README.md" "release-package\" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "release-package\" }
          
          Write-Host "Package contents:"
          Get-ChildItem -Path "release-package" -Recurse
        } else {
          Write-Error "Executable not found!"
          exit 1
        }
        
    - name: Create Archive
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $archiveName = "Waifu2x-Extension-GUI-$version-Windows-x64.zip"
        Compress-Archive -Path "release-package\*" -DestinationPath $archiveName
        echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV
        
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Waifu2x-Extension-GUI-${{ steps.version.outputs.VERSION }}
        path: release-package/
        
    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ARCHIVE_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
